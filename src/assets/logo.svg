<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Solid Warm Obsidian background -->
  <rect width="100%" height="100%" fill="#121214" />
  
  <!-- Stark Bauhaus Display/Light emblem -->
  <!-- Outer circular frame representing lens/aperture -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="#f7f6f3" stroke-width="4" />
  
  <!-- Vertical dividing prism ray -->
  <line x1="50" y1="22" x2="50" y2="78" stroke="#f7f6f3" stroke-width="4" stroke-linecap="round" />
  
  <!-- Horizontal screen line -->
  <line x1="22" y1="50" x2="78" y2="50" stroke="#f7f6f3" stroke-width="2" opacity="0.4" />
  
  <!-- Minimalist light source indicator -->
  <circle cx="50" cy="50" r="6" fill="#f7f6f3" />
</svg>